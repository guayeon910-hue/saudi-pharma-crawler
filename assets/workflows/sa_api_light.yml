name: SA API Light

# Tier 1 API 기반 경량 크롤링 (SFDA, SFDA Drugs List 등)
# AST 01:00 (UTC 22:00 전날)

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      toggle_id:
        description: '실행할 토글 (toggle_1 ~ toggle_8)'
        required: true
        default: 'toggle_1'
      dry_run:
        description: 'DB 삽입 없이 로그만'
        required: false
        default: 'false'

concurrency:
  group: sa-api-light
  cancel-in-progress: false    # 취소 대신 큐잉

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler
        env:
          # Supabase
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

          # SFDA OAuth
          SFDA_CLIENT_ID:       ${{ secrets.SFDA_CLIENT_ID }}
          SFDA_CLIENT_SECRET:   ${{ secrets.SFDA_CLIENT_SECRET }}

          # LLM (AI 판단 레이어용 — 여기선 안 쓰지만 공통 주입)
          CLAUDE_API_KEY:       ${{ secrets.CLAUDE_API_KEY }}

          # 런타임 파라미터
          WORKFLOW:             sa_api_light
          TOGGLE_ID:            ${{ github.event.inputs.toggle_id || 'toggle_1' }}
          DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}
          GITHUB_RUN_ID:        ${{ github.run_id }}
        run: python main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sa-api-light-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "🚨 SA API Light 크롤러 실패",
              "blocks": [
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Workflow:*\nsa_api_light"},
                    {"type": "mrkdwn", "text": "*Run ID:*\n${{ github.run_id }}"},
                    {"type": "mrkdwn", "text": "*Toggle:*\n${{ github.event.inputs.toggle_id || 'toggle_1' }}"},
                    {"type": "mrkdwn", "text": "*Commit:*\n${{ github.sha }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "로그 보기"},
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

name: SA API Light

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      toggle_id:
        description: 'Toggle ID (toggle_1 ~ toggle_8)'
        required: true
        default: 'toggle_1'
      dry_run:
        description: 'Dry run (no DB insert)'
        required: false
        default: 'false'

concurrency:
  group: sa-api-light
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          WORKFLOW: sa_api_light
          TOGGLE_ID: ${{ github.event.inputs.toggle_id || 'toggle_1' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python main.py

name: SA Retail Mid

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      source_filter:
        description: 'Source filter (nahdi_web / al_dawaa_web / whites_web / all)'
        required: false
        default: 'all'

concurrency:
  group: sa-retail-mid
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        source:
          - nahdi_web
          - al_dawaa_web
          - whites_web

    steps:
      - uses: actions/checkout@v4

      - name: Check source filter
        id: filter
        run: |
          FILTER="${{ github.event.inputs.source_filter || 'all' }}"
          if [ "$FILTER" = "all" ] || [ "$FILTER" = "${{ matrix.source }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.filter.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.filter.outputs.should_run == 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler for ${{ matrix.source }}
        if: steps.filter.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOURCE_NAME: ${{ matrix.source }}
          TOGGLE_ID: toggle_2
          GITHUB_RUN_ID: ${{ github.run_id }}
          WORKFLOW: sa_retail_mid
        run: python main.py --source ${{ matrix.source }}
